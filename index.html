<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durger King Clone</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            /* Usamos las variables de color de Telegram para que se adapte al modo oscuro/claro */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .item-card {
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 15px;
            width: 80%;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        .btn-add {
            background-color: #3390ec;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .card-img {
            width: 100%;       
            height: auto;      
            display: block;   
    
            border-radius: 8px;
            max-height: 250px; 
            object-fit: cover; 
}
    </style>
</head>
<body>

    <div class="container">
        <h1>Durger King 🍔</h1>
        <p>Hola, <b id="username">Usuario</b>. ¿Qué vas a comer hoy?</p>

        <div class="item-card">
            <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500" alt="Hamburguesa" class="card-img">
            <h3>Hamburguesa</h3>
            <p>$10.00</p>
            <button class="btn-add" onclick="agregarAlCarrito('Combo Simple', 10.00)">Agregar</button>
        </div>

        <div class="item-card">
            <img src="https://images.unsplash.com/photo-1541214113241-21578d2d9b62?w=500" alt="Perrito Caliente" class="card-img">
            <h3>Perrito Caliente</h3>
            <p>$10.00</p>
            <button class="btn-add" onclick="agregarAlCarrito('Combo Doble', 15.00)">Agregar</button>
        </div>

        <div class="item-card">
            <img src="https://images.unsplash.com/photo-1630384066252-19e1ad95536a?w=500" alt="Patatas Fritas" class="card-img">
            <h3>Patatas Fritas</h3>
            <p>$7.50</p>
            <button class="btn-add" onclick="agregarAlCarrito('Combo Doble', 15.00)">Agregar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
