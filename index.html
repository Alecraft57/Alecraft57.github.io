<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durger King Clone</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            /* Usamos las variables de color de Telegram para que se adapte al modo oscuro/claro */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .item-card {
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 15px;
            width: 80%;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            position: relative;
        }
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #ff3b30; /* Rojo llamativo */
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-add {
            background-color: #3390ec;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .card-img {
            width: 100%;       
            height: auto;      
            display: block;   
    
            border-radius: 8px;
            max-height: 250px; 
            object-fit: cover; 
}
    </style>
</head>
<body>

    <div class="container">
        <h1>Durger King 🍔</h1>
        <p>Hola, <b id="username">Usuario</b>. ¿Qué vas a comer hoy?</p>
        
        <button id="btn-vaciar" onclick="vaciarCarrito()" style="display:none;">🗑️ Vaciar Carrito</button>

        <div class="item-card">
            <span class="badge">🔥 POPULAR</span> <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500" alt="Hamburguesa" class="card-img">
            <h3>Hamburguesa</h3>
            <p>10.00€</p>
            <button class="btn-add" onclick="agregarAlCarrito('Hamburguesa', 10.00)">Agregar</button>
        </div>

        <div class="item-card">
            <img src="https://images.unsplash.com/photo-1541214113241-21578d2d9b62?w=500" alt="Perrito Caliente" class="card-img">
            <h3>Perrito Caliente</h3>
            <p>10.00€</p>
            <button class="btn-add" onclick="agregarAlCarrito('Perrito Caliente', 10.00)">Agregar</button>
        </div>

        <div class="item-card">
            <span class="badge">🔥 POPULAR</span> <img src="https://images.unsplash.com/photo-1605262157780-8910063b2bf9?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Patatas Fritas" class="card-img">
            <h3>Patatas Fritas</h3>
            <p>7.50€</p>
            <button class="btn-add" onclick="agregarAlCarrito('Patatas Fritas', 7.50)">Agregar</button>
        </div>

        <div class="item-card"> 
            <span class="badge">🍹 NECESARIO</span><img src="https://images.unsplash.com/photo-1517959105821-eaf2591984ca?q=80&w=1173&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Refresco" class="card-img">
            <h3>Refresco</h3>
            <p>2.50€</p>
            <button class="btn-add" onclick="agregarAlCarrito('Refresco', 2.50)">Agregar</button>
        </div>

        <div class="item-card"> 
            <img src="https://images.unsplash.com/photo-1534308983496-4fabb1a015ee?q=80&w=1176&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Pizza Pepperoni" class="card-img">
            <h3>Pizza Pepperoni</h3>
            <p>12.50€</p>
            <button class="btn-add" onclick="agregarAlCarrito('Pizza Pepperoni', 12.50)">Agregar</button>
        </div>

        <div class="item-card"> 
            <span class="badge">🍨 POSTRE</span> <img src="https://images.unsplash.com/photo-1587314168485-3236d6710814?q=80&w=1078&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Trilogía de Crepes del Bosque" class="card-img">
            <h3>Trilogía de Crepes del Bosque</h3>
            <p>6.00€</p>
            <button class="btn-add" onclick="agregarAlCarrito('Trilogía de Crepes del Bosque', 6.00)">Agregar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
